<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .clock {
            font-size: 2em;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Digital Clock</h1>
    <div class="clock" id="clock"></div>
    <script>
        function updateClocks() {
            const date = new Date();
            const options = { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('clock').innerHTML = 'US Eastern: ' + date.toLocaleTimeString('en-US', options);

            options.timeZone = 'America/Chicago';
            document.getElementById('clock').innerHTML += '<br>US Central: ' + date.toLocaleTimeString('en-US', options);

            options.timeZone = 'America/Denver';
            document.getElementById('clock').innerHTML += '<br>US Mountain: ' + date.toLocaleTimeString('en-US', options);

            options.timeZone = 'America/Los_Angeles';
            document.getElementById('clock').innerHTML += '<br>US Pacific: ' + date.toLocaleTimeString('en-US', options);

            options.timeZone = 'GMT';
            document.getElementById('clock').innerHTML += '<br>GMT: ' + date.toLocaleTimeString('en-US', options);

            options.timeZone = 'Asia/Tokyo';
            document.getElementById('clock').innerHTML += '<br>Asia/Tokyo: ' + date.toLocaleTimeString('en-US', options);
        }

        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
